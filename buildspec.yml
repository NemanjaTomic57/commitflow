---
version: 0.2

env:
  variables:
    AWS_REGION: eu-central-1
    ECR_REPOSITORY: commitflow

phases:
  pre_build:
    commands:
      - echo $CODEBUILD_RESOLVED_SOURCE_VERSION
      - COMMIT_SHA=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c1-7)
      - ACCOUNT_ID=$(aws sts get-caller-identity --query 'Account' --output text)
      - ECR_URI=$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY

      - |
        aws ecr get-login-password --region $AWS_REGION \
          | buildah login --username AWS --password-stdin $ECR_URI
    finally:
      - cat /etc/os-release

  build: 
    commands:
      - test -z "$(gofmt -l .)"
      - go vet ./...
      - golangci-lint run
      - yamllint .
      - hadolint Dockerfile

      - buildah build -t $ECR_URI:$COMMIT_SHA --format docker .
      - buildah tag $ECR_URI:$COMMIT_SHA $ECR_URI:latest
      - buildah push $ECR_URI:$COMMIT_SHA
      - buildah push $ECR_URI:latest
      
