edition = "2024";
package commitflow;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/NemanjaTomic57/commitflow/proto";

message GitCommit {
  string provider = 1;
  string id = 2;
  string path = 3;
  string path_with_namespace = 4;
  string author_name = 5;
  string author_email = 6;
  string message = 7;
  string url = 8;
  google.protobuf.Timestamp created_at = 9;
}
