---
- name: Install Kafka and add to PATH
  hosts: all

  vars:
    kafka_url: https://downloads.apache.org/kafka/4.2.0/kafka_2.13-4.2.0.tgz
    kafka_archive: kafka_2.13-4.2.0.tgz

  tasks:
    - name: Install dependencies
      become: true
      ansible.builtin.dnf:
        name:
          - java-21-openjdk-devel
          - unzip
          - tar
          - wget
          - rsync
          - net-tools
          - jq
        state: present

    - name: Create Kafka directory
      become: true
      ansible.builtin.file:
        path: "{{ kafka }}"
        state: directory
        mode: "0700"
        owner: vagrant
        group: vagrant

    - name: Check if Kafka is installed
      ansible.builtin.stat:
        path: "{{ kafka_install_dir }}"
      register: kafka_installed

    - name: Download Kafka archive
      ansible.builtin.get_url:
        url: "{{ kafka_url }}"
        dest: "/tmp/{{ kafka_archive }}"
        mode: "0644"
      when: not kafka_installed.stat.exists

    - name: Extract Kafka archive
      ansible.builtin.unarchive:
        src: "/tmp/{{ kafka_archive }}"
        dest: "{{ kafka }}"
        remote_src: true
      when: not kafka_installed.stat.exists

    - name: Add Kafka to PATH
      become: true
      ansible.builtin.copy:
        dest: /etc/profile.d/kafka.sh
        content: |
          export PATH={{ kafka_bin }}:$PATH
        mode: "0755"


- name: Install and configure PostgreSQL
  hosts: all
  gather_facts: false
  become: true

  tasks:
    - name: Install PostgreSQL repository RPM
      ansible.builtin.dnf:
        name: https://download.postgresql.org/pub/repos/yum/reporpms/EL-10-x86_64/pgdg-redhat-repo-latest.noarch.rpm
        state: present
        disable_gpg_check: true

    - name: Install PostgreSQL 18 server
      ansible.builtin.dnf:
        name: postgresql18-server
        state: present

    - name: Check if PostgreSQL data directory exists
      ansible.builtin.stat:
        path: /var/lib/pgsql/18/data/PG_VERSION
      register: pg_data

    - name: Initialize PostgreSQL database
      ansible.builtin.command:
        cmd: /usr/pgsql-18/bin/postgresql-18-setup initdb
      when: not pg_data.stat.exists
      changed_when: true

    - name: Enable and start PostgreSQL service
      ansible.builtin.systemd:
        name: postgresql-18
        enabled: true
        state: started

    - name: Install PostgreSQL Python dependencies
      ansible.builtin.dnf:
        name: python3-psycopg2
        state: present

    - name: Create DB user
      become: true
      become_user: postgres
      community.postgresql.postgresql_user:
        name: vagrant
        password: password

    - name: Create DB user
      become: true
      become_user: postgres
      community.postgresql.postgresql_db:
        name: git_logs
        owner: vagrant


- name: Configure Kafka
  hosts: all
  vars:
    kafka_cluster_id: "{{ kafka }}/cluster.id"
    kafka_logs: "{{ kafka }}/logs"
    kafka_config: /vagrant/kafka/server.properties
    connect_config: /vagrant/kafka/connect/connect.properties
    connect_s3_config: "{{ kafka }}/connect-s3.json"

  tasks:
    - name: Check if cluster ID exists
      ansible.builtin.stat:
        path: "{{ kafka_cluster_id }}"
      register: cluster_id_file

    - name: Generate Kafka cluster ID if not exist
      when: not cluster_id_file.stat.exists
      block:
        - name: Generate Kafka cluster ID
          ansible.builtin.command: "{{ kafka_bin }}/kafka-storage.sh random-uuid"
          register: kafka_uuid
          changed_when: false

        - name: Save cluster ID
          ansible.builtin.copy:
            content: "{{ kafka_uuid.stdout }}"
            dest: "{{ kafka_cluster_id }}"
            mode: "0444"

    - name: Read existing cluster ID
      ansible.builtin.command: "cat {{ kafka_cluster_id }}"
      register: kafka_uuid
      changed_when: false

    - name: Configure Kafka broker
      ansible.builtin.command: >
        {{ kafka_bin }}/kafka-storage.sh format
        --standalone
        -t {{ kafka_uuid.stdout }}
        -c {{ kafka_config }}
      args:
        creates: "{{ kafka_logs }}/meta.properties"

    - name: Create Kafka systemd service
      become: true
      ansible.builtin.template:
        src: ./systemd/kafka.service.j2
        dest: /etc/systemd/system/kafka.service
        mode: '0644'

    - name: Reload systemd
      become: true
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Enable and start Kafka
      become: true
      ansible.builtin.systemd:
        name: kafka
        enabled: true
        state: restarted

    - name: Ensure Kafka libs directory exists
      ansible.builtin.file:
        path: "{{ kafka_libs }}"
        state: directory
        mode: '0755'

    - name: Download Confluent S3 sink connector
      ansible.builtin.get_url:
        url: https://pub-7ea43db0438a4a858ae4acf14c0ae7f2.r2.dev/kafka/libs/confluentinc-kafka-connect-s3-12.1.5.zip
        dest: /tmp/confluentinc-kafka-connect-s3-12.1.5.zip
        mode: '0644'

    - name: Unarchive Confluent S3 sink connector
      ansible.builtin.unarchive:
        src: /tmp/confluentinc-kafka-connect-s3-12.1.5.zip
        dest: "{{ kafka_libs }}"
        remote_src: true
        creates: "{{ kafka_libs }}/confluentinc-kafka-connect-s3-12.1.5"

    - name: Ensure .aws directory exists
      ansible.builtin.file:
        path: /home/vagrant/.aws
        state: directory
        owner: vagrant
        group: vagrant
        mode: '0700'

    - name: Create AWS credentials file
      ansible.builtin.template:
        src: ./aws/credentials.j2
        dest: /home/vagrant/.aws/credentials
        owner: vagrant
        group: vagrant
        mode: '0600'
      vars:
        aws_access_key_id: "{{ lookup('env', 'AWS_ACCESS_KEY_ID') }}"
        aws_secret_access_key: "{{ lookup('env', 'AWS_SECRET_ACCESS_KEY') }}"

    - name: Download Confluent JDBC sink connector
      ansible.builtin.get_url:
        url: https://pub-7ea43db0438a4a858ae4acf14c0ae7f2.r2.dev/kafka/libs/confluentinc-kafka-connect-jdbc-10.9.4.zip
        dest: /tmp/confluentinc-kafka-connect-jdbc-10.9.4.zip
        mode: '0644'

    - name: Unarchive Confluent JDBC sink connector
      ansible.builtin.unarchive:
        src: /tmp/confluentinc-kafka-connect-jdbc-10.9.4.zip
        dest: "{{ kafka_libs }}"
        remote_src: true
        creates: "{{ kafka_libs }}/confluentinc-kafka-connect-jdbc-10.9.4"

    - name: Create Kafka Connect systemd service
      become: true
      ansible.builtin.template:
        src: ./systemd/kafka-connect.service.j2
        dest: /etc/systemd/system/kafka-connect.service
        mode: '0644'

    - name: Reload systemd
      become: true
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Enable and start Kafka Connect
      become: true
      ansible.builtin.systemd:
        name: kafka-connect
        enabled: true
        state: restarted

    - name: Wait for Kafka Connect REST API
      ansible.builtin.uri:
        url: http://{{ ansible_host }}:8083/connectors
        method: GET
        status_code: 200
      register: connect_result
      retries: 5
      delay: 5
      until: connect_result.status == 200

    - name: Render S3 connector config
      ansible.builtin.template:
        src: ./kafka/connect/s3.json.j2
        dest: "{{ connect_s3_config }}"
        mode: "0644"
      vars:
        s3_bucket_name: "{{ lookup('env', 'AWS_S3_BUCKET') }}"

    - name: Read S3 connector config
      ansible.builtin.slurp:
        src: "{{ connect_s3_config }}"
      register: s3_config

    - name: Update S3 connector config
      ansible.builtin.uri:
        url: "http://{{ ansible_host }}:8083/connectors/s3-sink/config"
        method: PUT
        body_format: json
        body: "{{ (s3_config.content | b64decode | from_json).config }}"
        headers:
          Content-Type: application/json
        status_code:
          - 200
          - 201

    - name: Update PostgreSQL connector config
      ansible.builtin.uri:
        url: "http://{{ ansible_host }}:8083/connectors/postgres-sink/config"
        method: PUT
        body_format: json
        body: "{{ (lookup('file', './kafka/connect/postgres.json') | from_json).config }}"
        headers:
          Content-Type: application/json
        status_code:
          - 200
          - 201


- name: Install Protocol Buffers Compiler (protoc)
  hosts: all
  vars:
    install_dir: "{{ ansible_facts['env'].HOME }}/.local/protoc"

  tasks:
    - name: Ensure required packages are installed
      become: true
      ansible.builtin.dnf:
        name:
          - curl
          - unzip
          - jq
        state: present

    - name: Get latest protoc download URL
      ansible.builtin.shell: |
        set -o pipefail
        curl -s https://api.github.com/repos/protocolbuffers/protobuf/releases/latest \
          | jq -r '.assets[] | select(.name | endswith("linux-x86_64.zip")) | .browser_download_url'
      register: protoc_url
      changed_when: false

    - name: Download protoc archive
      ansible.builtin.get_url:
        url: "{{ protoc_url.stdout }}"
        dest: /tmp/protoc.zip
        mode: '0644'

    - name: Create installation directory
      ansible.builtin.file:
        path: "{{ install_dir }}"
        state: directory
        mode: '0755'

    - name: Extract protoc
      ansible.builtin.unarchive:
        src: /tmp/protoc.zip
        dest: "{{ install_dir }}"
        remote_src: true

    - name: Add protoc to PATH
      ansible.builtin.lineinfile:
        path: "{{ ansible_facts['env'].HOME }}/.bashrc"
        line: 'export PATH="$PATH:$HOME/.local/protoc/bin"'
        state: present


- name: Install Grafana
  hosts: all
  gather_facts: false
  become: true

  tasks:
    - name: Install required packages
      ansible.builtin.dnf:
        name:
          - wget
          - curl
          - gnupg2
        state: present

    - name: Create Grafana repo
      ansible.builtin.copy:
        dest: /etc/yum.repos.d/grafana.repo
        mode: "0644"
        content: |
          [grafana]
          name=Grafana OSS
          baseurl=https://rpm.grafana.com
          repo_gpgcheck=1
          enabled=1
          gpgcheck=1
          gpgkey=https://rpm.grafana.com/gpg.key
          sslverify=1
          sslcacert=/etc/pki/tls/certs/ca-bundle.crt

    - name: Install Grafana
      ansible.builtin.dnf:
        name: grafana
        state: present

    - name: Enable and start Grafana
      ansible.builtin.systemd:
        name: grafana-server
        enabled: true
        state: started


- name: Configure firewalld
  hosts: all
  gather_facts: false
  become: true

  tasks:
    - name: Enable Kafka port 9092
      ansible.posix.firewalld:
        port: 9092/tcp
        state: enabled
        permanent: true
        immediate: true
        offline: true
